name: Deploy public App Store pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pages.yml"
      - "docs/.nojekyll"
      - "docs/support/**"
      - "docs/privacy/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build public static pages
        run: |
          mkdir -p _site/support _site/privacy
          cp docs/.nojekyll _site/.nojekyll
          cp docs/support/index.html _site/support/index.html
          cp docs/privacy/index.html _site/privacy/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
